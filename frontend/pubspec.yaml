name: frontend
description: "ALU Co-Lab - Find your Clan. Build your team. Lead the way."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  gap: ^3.0.1
  badges: ^3.1.2

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.4.2
  equatable: ^2.0.5

  # Storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # Firebase (structured for integration)
  # firebase_core: ^3.4.0
  # firebase_auth: ^5.2.0
  # cloud_firestore: ^5.4.0
  # firebase_storage: ^12.2.0
  # firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
