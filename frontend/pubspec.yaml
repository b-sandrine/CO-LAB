name: frontend
description: "ALU Co-Lab - Find your Clan. Build your team. Lead the way."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Auth
  crypto: ^3.0.3

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  gap: ^3.0.1
  badges: ^3.1.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.4.2
  equatable: ^2.0.5
  rxdart: ^0.28.0

  # Storage / Cache
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
